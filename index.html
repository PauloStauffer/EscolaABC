<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Escola ABC</title>
    <link rel="icon" type="image/png" href="./Imagens/favicon-32x32.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <button type="button" class="sidebar-button" aria-label="Configurações">⚙</button>
        </aside>
        <main class="main">
            <div class="image-panel" aria-hidden="true">
                <div class="background-image"></div>
                <div class="foreground-image"></div>
            </div>
            <div class="placeholder-area" aria-hidden="true">
                <div class="placeholder-box placeholder-large placeholder-test1"></div>
                <div class="placeholder-box placeholder-large placeholder-test2"></div>
                <div class="placeholder-box placeholder-large placeholder-test3"></div>
            </div>
            <header class="page-header">
                <h1>Escola ABC</h1>
            </header>
            <div class="content">
                <input type="radio" id="login-tab" name="tab" checked>
                <input type="radio" id="signup-tab" name="tab">
                <div class="tabs">
                    <label for="login-tab" class="tab-label">Login</label>
                    <label for="signup-tab" class="tab-label">Cadastro</label>
                </div>
                <div class="login-box">
                    <h2>Login</h2>
                    <form id="login-form">
                        <br>
                        <label for="matricula">Matrícula:</label>
                        <input type="text" id="matricula" name="matricula" required>
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required>
                        <button type="submit">Entrar</button>
                    </form>
                </div>
                <div class="signup-box">
                    <h2>Cadastro</h2>
                    <br>
                    <form id="signup-form">
                        <div class="form-row">
                            <div class="field large">
                                <label for="nome">Nome completo:</label>
                                <input type="text" id="nome" name="nome" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="field half">
                                <label for="cpf">CPF:</label>
                                <input type="text" id="cpf" name="cpf" required>
                            </div>
                            <div class="field half">
                                <label for="matricula-signup">Matrícula:</label>
                                <input type="text" id="matricula-signup" name="matricula" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="field half">
                                <label for="senha-signup">Senha:</label>
                                <input type="password" id="senha-signup" name="senha" required>
                            </div>
                            <div class="field half">
                                <label for="numero">Número:</label>
                                <input type="text" id="numero" name="numero" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="field large">
                                <label for="rua">Rua:</label>
                                <input type="text" id="rua" name="rua" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="field half">
                                <label for="bairro">Bairro:</label>
                                <input type="text" id="bairro" name="bairro" required>
                            </div>
                            <div class="field half">
                                <label for="cidade">Cidade:</label>
                                <input type="text" id="cidade" name="cidade" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="field large">
                                <label for="estado">Estado:</label>
                                <input type="text" id="estado" name="estado" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <button type="submit">Cadastrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <footer class="page-footer">
        <p>@copy Escola ABC</p>
    </footer>
    <script>
        const sidebar = document.querySelector('.sidebar');
        sidebar.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });
    </script>
</body>
</html>
