<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Boletim do Aluno - Escola ABC</title>
        <link rel="stylesheet" href="styles2.css">
        <link rel="icon" type="image/png" href="../Imagens/favicon-32x32.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    color:#333;
}

.container{
    display:flex;
    min-height:100vh;
}


/* CONTEÚDO */

.main{
    flex:1;
    padding:40px;
}

.page-header{
    margin-bottom:30px;
}

.page-header h1{
    font-size:32px;
    margin-bottom:10px;
}

.page-header p{
    color:#666;
}

/* CARD */

.card{
    background:#fff;
    border-radius:16px;
    padding:25px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* DADOS DO ALUNO */

.student-info{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.info-box{
    background:#f8fafc;
    padding:15px;
    border-radius:10px;
}

.info-box span{
    display:block;
    font-size:14px;
    color:#666;
    margin-bottom:5px;
}

.info-box strong{
    font-size:18px;
}

/* TABELA */

.table-list{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

.table-list thead{
    background:#3b82f6;
    color:#fff;
}

.table-list th,
.table-list td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.aprovado{
    color:green;
    font-weight:bold;
}

.recuperacao{
    color:#d97706;
    font-weight:bold;
}

.reprovado{
    color:red;
    font-weight:bold;
}

/* MÉDIA FINAL */

.final-result{
    margin-top:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#eff6ff;
    padding:20px;
    border-radius:12px;
    flex-wrap:wrap;
    gap:15px;
}

.final-result h2{
    color:#1d4ed8;
}

.final-result .status{
    font-size:20px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    background:#1e293b;
    color:#fff;
}

@media(max-width:768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .main{
        padding:20px;
    }

}

</style>

</head>
<body>

<div class="container">

    <!-- MENU -->
    <aside class="sidebar">

        <nav class="sidebar-nav">
            <a href="Inicial_Aluno.html" class="sidebar-link">Inicio</a>
            <a href="Boletim_Aluno.html" class="sidebar-link active">Boletim</a>
            <a href="Config.html" class="sidebar-link">Configuração</a>
        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="main">

        <!-- TOPO -->
        <header class="page-header">
            <h1>BOLETIM ESCOLAR</h1>
            <p>Visualize suas notas e desempenho escolar</p>
        </header>

        <!-- DADOS DO ALUNO -->
        <section class="card">

            <div class="student-info">

                <div class="info-box">
                    <span>Aluno</span>
                    <strong id="nomeAluno"></strong>
                </div>

                <div class="info-box">
                    <span>Matrícula</span>
                    <strong id="matriculaAluno"></strong>
                </div>

                <div class="info-box">
                    <span>Turma</span>
                    <strong id="turmaAluno"></strong>
                </div>

                <div class="info-box">
                    <span>Ano Letivo</span>
                    <strong>2026</strong>
                </div>

            </div>

            <!-- TABELA DE NOTAS -->
            <table class="table-list">

                <thead>
                    <tr>
                        <th>Disciplina</th>
                        <th>1ª Nota</th>
                        <th>2ª Nota</th>
                        <th>3ª Nota</th>
                        <th>Média</th>
                        <th>Situação</th>
                    </tr>
                </thead>

                <tbody id="tabelaNotas">
                </tbody>

            </table>

            <!-- RESULTADO FINAL -->
            <div class="final-result">

                <div>
                    <h2>Média Geral: 7.5</h2>
                </div>

                <div class="status aprovado">
                    Situação Final: APROVADO
                </div>

            </div>

        </section>

    </main>

</div>

<footer>
    <p>&copy; Escola ABC</p>
</footer>

<script>

async function carregarBoletim() {

    // PEGA USUÁRIO
    const usuario =
        JSON.parse(
            localStorage.getItem('usuario')
        )

    if (!usuario) {

        window.location.href =
            '../Login.html'

        return
    }

    // DADOS ALUNO
    document.getElementById(
        'nomeAluno'
    ).innerText = usuario.nome

    document.getElementById(
        'matriculaAluno'
    ).innerText = usuario.matricula

    // BUSCAR BOLETIM
    const resposta = await fetch(

        `http://localhost:3000/boletim/${usuario.id}`

    )

    const dados =
        await resposta.json()

    console.log(dados)

    // TURMA
    if (dados.length > 0) {

        document.getElementById(
            'turmaAluno'
        ).innerText = dados[0].Classe
    }

    // TABELA
    const tabela =
        document.getElementById(
            'tabelaNotas'
        )

    tabela.innerHTML = ''

    dados.forEach(item => {

        let situacao = ''
        let classe = ''

        if (item.Valor_Nota >= 7) {

            situacao = 'Aprovado'
            classe = 'aprovado'

        }

        else if (item.Valor_Nota >= 5) {

            situacao = 'Recuperação'
            classe = 'recuperacao'

        }

        else {

            situacao = 'Reprovado'
            classe = 'reprovado'

        }

        tabela.innerHTML += `

            <tr>

                <td>${item.Disciplina}</td>

                <td>${item.Valor_Nota}</td>

                <td>-</td>

                <td>-</td>

                <td>${item.Valor_Nota}</td>

                <td class="${classe}">
                    ${situacao}
                </td>

            </tr>

        `
    })

}

carregarBoletim()

</script>

</body>
</html>
