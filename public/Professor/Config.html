<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Configuração - Escola ABC</title>

<link
rel="icon"
type="image/png"
href="../Imagens/favicon-32x32.png">

<link
rel="stylesheet"
href="styles2.css">

<style>

.profile-card{

    background:#fff;
    border-radius:16px;
    padding:30px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);

}

.profile-header{

    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;

}

.profile-avatar{

    width:100px;
    height:100px;
    border-radius:50%;
    background:#3b82f6;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;

}

.profile-info h2{

    font-size:28px;
    margin-bottom:10px;

}

.profile-info p{

    color:#666;
    margin-bottom:5px;

}

.info-grid{

    display:grid;
    grid-template-columns:
    repeat(auto-fit, minmax(250px,1fr));

    gap:20px;

}

.info-box{

    background:#f8fafc;
    padding:20px;
    border-radius:12px;

}

.info-box span{

    display:block;
    color:#666;
    margin-bottom:5px;

}

.info-box strong{

    font-size:18px;

}

.logout-area{

    margin-top:30px;
    text-align:right;

}

.logout-btn{

    background:#ef4444;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;

}

.logout-btn:hover{

    opacity:0.9;

}

</style>

</head>

<body>

<div class="container">

    <!-- MENU -->
    <aside class="sidebar">

        <nav class="sidebar-nav">

            <a
            href="Inicial_professor.html"
            class="sidebar-link">

                Inicio

            </a>

            <a
            href="Turmas_professor.html"
            class="sidebar-link">

                Minhas Turmas

            </a>

            <a
            href="Config.html"
            class="sidebar-link active">

                Configuração

            </a>

        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="main">

        <!-- TOPO -->
        <header class="page-header">

            <h1>CONFIGURAÇÃO</h1>

            <p>
                Informações da conta do Professor
            </p>

        </header>

        <!-- CARD -->
        <section class="profile-card">

            <!-- PERFIL -->
            <div class="profile-header">

                <div
                class="profile-avatar"
                id="avatarProfessor">

                    P

                </div>

                <div class="profile-info">

                    <h2 id="nomeProfessor">
                        Carregando...
                    </h2>

                    <p id="matriculaProfessor">
                        Matrícula
                    </p>

                    <p id="tipoProfessor">
                        Tipo
                    </p>

                </div>

            </div>

            <!-- INFORMAÇÕES -->
            <div class="info-grid">

                <div class="info-box">

                    <span>Nome Completo</span>

                    <strong id="nomeCompleto">
                        ---
                    </strong>

                </div>

                <div class="info-box">

                    <span>Matrícula</span>

                    <strong id="matriculaInfo">
                        ---
                    </strong>

                </div>

                <div class="info-box">

                    <span>Tipo de Usuário</span>

                    <strong id="tipoInfo">
                        ---
                    </strong>

                </div>

            </div>

            <!-- SAIR -->
            <div class="logout-area">

                <button
                class="logout-btn"
                onclick="logout()">

                    Sair da Conta

                </button>

            </div>

        </section>

    </main>

</div>

<footer class="page-footer">

    <p>
        &copy; Escola ABC
    </p>

</footer>

<script>

// VERIFICA LOGIN
const usuario = JSON.parse(
    localStorage.getItem('usuario')
)

// SEM LOGIN
if(!usuario){

    window.location.href =
        '../Login.html'

}

// DADOS
document.getElementById(
    'nomeProfessor'
).innerText = usuario.nome

document.getElementById(
    'matriculaProfessor'
).innerText =
    'Matrícula: ' +
    usuario.matricula

document.getElementById(
    'tipoProfessor'
).innerText =
    usuario.tipo

document.getElementById(
    'nomeCompleto'
).innerText =
    usuario.nome

document.getElementById(
    'matriculaInfo'
).innerText =
    usuario.matricula

document.getElementById(
    'tipoInfo'
).innerText =
    usuario.tipo

// AVATAR
document.getElementById(
    'avatarProfessor'
).innerText =
    usuario.nome.charAt(0)

// LOGOUT
function logout(){

    localStorage.removeItem(
        'usuario'
    )

    window.location.href =
        '../Login.html'

}

</script>

</body>
</html>
